<!DOCTYPE html>
<html>
<head>

<title>Spotly</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

h1{
margin-top:40px;
}

.search-box{
margin:30px;
}

input,select{
padding:10px;
margin:5px;
font-size:16px;
}

button{
padding:10px 20px;
background:black;
color:white;
border:none;
cursor:pointer;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.card{
background:white;
width:260px;
margin:15px;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:left;
}

.card h3{
margin:0;
}

.stars{
color:gold;
}

</style>

</head>

<body>

<h1>Spotly 🍽</h1>
<p>Find restaurants near you</p>

<div class="search-box">

<input id="cuisine" placeholder="Cuisine (Italian, Indian)">

<input id="location" placeholder="Location">

<select id="price">
<option value="">Any Price</option>
<option value="500">Under ₹500</option>
<option value="1000">₹1000</option>
<option value="2000">₹2000+</option>
<option value="5000">₹5000+</option>
</select>

<button onclick="search()">Search</button>

</div>

<div class="container" id="results"></div>

<script>

function stars(rating){

let full = Math.round(rating)
let star = ""

for(let i=0;i<full;i++){
star += "⭐"
}

return star
}

function search(){

let cuisine = document.getElementById("cuisine").value
let location = document.getElementById("location").value
let price = document.getElementById("price").value

fetch(`/recommend?cuisine=${cuisine}&location=${location}&price=${price}`)
.then(res=>res.json())
.then(data=>{

let html=""

data.forEach(r=>{

html+=`

<div class="card">

<h3>${r.name}</h3>

<p><b>Cuisine:</b> ${r.cuisine}</p>

<p><b>Location:</b> ${r.location}</p>

<p class="stars">${stars(r.rating)} (${r.rating})</p>

<p><b>Price:</b> ₹${r.price}</p>

<p>${r.tags}</p>

</div>

`

})

document.getElementById("results").innerHTML=html

})

}

</script>

</body>
</html>
